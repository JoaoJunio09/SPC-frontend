<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Presença - SPC</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/registrar_presenca.css">
    <link rel="stylesheet" href="styles/modal_confirmation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- HEADER PADRÃO -->
    <header class="main-header">
        <div class="container header-container">
            <div class="logo-area">
                <div class="church-logo-placeholder">
                    <img src="assets/images/brasao_paroquia.png" alt="Brasão" onerror="this.src='https://via.placeholder.com/60/F59E0B/FFFFFF?text=⛪'">
                </div>
                <div class="system-title">
                    <h1>SPC</h1>
                    <p>Presença Catequese</p>
                </div>
            </div>
            <button class="menu-toggle" id="btnMenu" onclick="toggleMenu()">
                ☰ MENU
            </button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="turmas.html">Turmas</a></li>
                    <li><a href="#">Catequizandos</a></li>
                    <li><a href="missas.html">Missas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Título da Página -->
        <section class="page-intro">
            <h2>Registrar Presença na Missa</h2>
            <p>Selecione uma turma ou pesquise um catequizando específico.</p>
        </section>

        <!-- Barra de Pesquisa -->
        <section class="search-section">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="inputBusca" placeholder="Pesquisar o nome do catequizando..." oninput="filtrarCatequizando()">
            </div>
        </section>

        <!-- Accordion de Turmas -->
        <section class="accordion-section">
            <div class="accordion-item">
                <button class="accordion-header" onclick="toggleAccordion()">
                    <span>Turmas Disponíveis</span>
                    <i data-lucide="chevron-down" id="accordion-icon"></i>
                </button>
                <div class="accordion-content" id="accordionContent">
                    <div class="turmas-grid" id="listaTurmas">
                        <!-- Turmas serão injetadas aqui -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Listagem de Catequizandos (Aparece após busca ou seleção de turma) -->
        <section class="attendance-section" id="attendanceSection" style="display: none;">
            <div class="section-header">
                <h3 id="tituloListagem">Catequizandos</h3>
                <button class="btn-clear" onclick="resetarPagina()">Limpar Seleção</button>
            </div>
            
            <div class="catequizandos-list" id="listaCatequizandos">
                <!-- Cards de catequizandos serão injetados aqui -->
            </div>

            <!-- Botão de Confirmação Final -->
            <div class="actions-footer">
                <button class="btn-confirm-final" onclick="confirmarRegistro()">
                    <i data-lucide="check-circle-2"></i>
                    Confirmar Registro de Presença
                </button>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script type="module">
        import { initPresenca } from './scripts/controllers/presenca/presenca_controller.js';
        window.onload = () => {
            initPresenca();
            if(window.lucide) lucide.createIcons();
        };
    </script>
    <script>
        function toggleMenu() {
            document.getElementById('mainNav').classList.toggle('open');
        }
    </script>
    <script type="module" src="scripts/controllers/presenca/presenca_controller.js"></script>
</body>
</html>
