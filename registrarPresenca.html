<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC - Registrar Presença</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/toast.css">
    <link rel="stylesheet" href="styles/registrar_presenca.css">
    <link rel="stylesheet" href="styles/modal_loading.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- HEADER PADRÃO -->
    <header class="main-header">
        <div class="container header-container">
            <div class="logo-area">
                <div class="church-logo-placeholder">
                    <img src="assets/images/brasao_paroquia.png" alt="Brasão" onerror="this.src='https://via.placeholder.com/60/F59E0B/FFFFFF?text=⛪'">
                </div>
                <div class="system-title">
                    <h1>SPC</h1>
                    <p>Presença Catequese</p>
                </div>
            </div>
            <button class="menu-toggle" id="btnMenu">
                ☰ MENU
            </button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="turmas.html">Turmas</a></li>
                    <li><a href="catequizandos.html">Catequizandos</a></li>
                    <li><a href="missas.html">Missas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="page-intro">
            <h2>Registrar Presença na Missa</h2>
            <p>Selecione uma turma ou pesquise um catequizando específico.</p>
        </section>

        <!-- Barra de Pesquisa -->
        <section class="search-section">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="inputSearch" placeholder="Pesquisar o nome do catequizando...">
            </div>
        </section>

        <!-- Accordion de Turmas -->
        <section class="accordion-section">
            <div class="accordion-item">
                <button class="accordion-header" id="toggle-accordion">
                    <span>Turmas Disponíveis</span>
                    <i data-lucide="chevron-down" id="accordion-icon"></i>
                </button>
                <div class="accordion-content" id="accordionContent">
                    <div class="turmas-grid" id="listSteps">
                        <!-- Turmas injetadas via controller -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Listagem de Catequizandos -->
        <section class="attendance-section" id="attendanceSection" style="display: none;">
            <div class="section-header">
                <h3 id="tituloListagem">Catequizandos</h3>
                <button class="btn-clear" id="reset">Limpar Seleção</button>
            </div>
            
            <div class="catequizandos-list" id="listCatechumens">
                <!-- Cards injetados via controller -->
            </div>

            <!-- Botão de Revisão (Redireciona para confirmação) -->
            <div class="actions-footer" id="actions-footer">
                <button class="btn-confirm-final">
                    <i data-lucide="eye"></i>
                    Revisar (<span id="countSelected">0</span>)
                </button>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script type="module" src="scripts/controllers/presenca/register/register_presence_controller.js"></script>
    <script type="module" src="scripts/controllers/presenca/register/events_dom.js"></script>
    <script type="module" src="scripts/utils/header.js"></script>
    <script>
        if(window.lucide) lucide.createIcons();
    </script>
</body>
</html>
