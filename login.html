<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC - Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <link rel="stylesheet" href="styles/toast.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <main class="login-container">
        <section class="login-card">
            
            <!-- Logo e Cabeçalho do Card -->
            <header class="login-header">
                <div class="logo-wrapper">
                    <img src="assets/images/brasao_paroquia.png" alt="Brasão da Paróquia" onerror="this.src='https://via.placeholder.com/80/F59E0B/FFFFFF?text=⛪'">
                </div>
                <div class="brand">
                    <h1>SPC</h1>
                    <p>Sistema de Presença</p>
                </div>
            </header>

            <!-- Formulário de Acesso -->
            
            <div class="login-form">
                <div class="input-group">
                    <label for="access-code">Quem é você?</label>
                    <select name="select-catechists" id="select-catechists" required>
                        <option value=""></option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="access-code">Código de acesso</label>
                    <select name="select-code" id="select-code" required>
                        <option value="default">Selecione o código</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                    </select>
                    <small class="input-hint">O código já foi fornecido pela paróquia.</small>
                </div>

                <button type="submit" class="btn-login">
                    Entrar
                </button>
            </div>            

            <footer class="login-footer">
                <p>&copy; 2026 Paróquia São Sebastião</p>
            </footer>

        </section>
    </main>

    <div id="toast-container"></div>

    <script type="module" src="scripts/controllers/login/login_controller.js"></script>
</body>
</html>
