<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC - Sistema de Presença dos Catequizandos</title>
    <link rel="stylesheet" href="styles/turmas.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/toast.css">
    <link rel="stylesheet" href="styles/modal_loading.css">
    <link rel="stylesheet" href="styles/modal_message.css">
    <link rel="stylesheet" href="styles/modal_confirmation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons (Apenas para renderização dos ícones no layout) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="main-header">
        <div class="container header-container">
            <!-- Área de Logo e Título -->
            <div class="logo-area">
                <div class="church-logo-placeholder">
                    <img src="assets/images/brasao_paroquia.png" alt="Logo Paróquia" id="">
                </div>
                <div class="system-title">
                    <h1>SPC</h1>
                    <p>Presença Catequese</p>
                </div>
            </div>

            <!-- Botão de Menu para Celulares -->
            <button class="menu-toggle" id="btnMenu">
                ☰ MENU
            </button>
            
            <!-- Navegação principal -->
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="turmas.html" class="active">Turmas</a></li>
                    <li><a href="catequizandos.html">Catequizandos</a></li>
                    <li><a href="missas.html">Missas</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <!-- TÍTULO DA PÁGINA -->
        <section class="page-intro">
            <h2>Gestão de Turmas e Catequistas</h2>
            <p>Controle a alocação de catequistas e visualize o desempenho de presença dos catequizandos.</p>
        </section>

        <!-- SEÇÃO CATEQUISTAS -->
        <section class="list-section">
            <h3 class="list-header">Catequistas da Paróquia</h3>
            
            <button class="btn-large" onclick="openModal('modalAddCatequista')">
                <span>➕</span> ADICIONAR CATEQUISTA
            </button>

            <div id="lista-catequistas" class="grid-cards">
                <!-- Injetado via JS -->
            </div>
        </section>

        <!-- SEÇÃO TURMAS -->
        <section class="list-section">
            <h3 class="list-header">Turmas da Catequese</h3>
            <div id="lista-turmas" class="grid-cards">
                <!-- Injetado via JS -->
            </div>
        </section>
    </div>

    <!-- MODAL ADICIONAR CATEQUISTA -->
    <div id="modalAddCatequista" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h3>Novo Catequista</h3></div>
            <div class="form-group">
                <label>Nome do Catequista</label>
                <input type="text" id="add-nome" placeholder="Digite o nome completo">
            </div>
            <div class="form-group">
                <label>Selecione a Turma</label>
                <select id="add-turma">
                    <option value="PRIMEIRA ETAPA">PRIMEIRA ETAPA</option>
                    <option value="SEGUNDA ETAPA">SEGUNDA ETAPA</option>
                    <option value="EUCARISTIA">EUCARISTIA</option>
                    <option value="PRÉ-CRISMA">PRÉ-CRISMA</option>
                    <option value="CRISMA">CRISMA</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-save" onclick="saveNewCatequista()">CADASTRAR</button>
                <button class="btn btn-cancel" onclick="closeModal('modalAddCatequista')">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL EDITAR CATEQUISTA -->
    <div id="modalEditCatequista" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h3>Editar Catequista</h3></div>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Primeiro nome</label>
                <input type="text" id="edit-first-name-catechist">
            </div>
            <div class="form-group">
                <label>Sobrenome</label>
                <input type="text" id="edit-last-name-catechist">
            </div>
            <div class="modal-footer">
                <button class="btn btn-save">SALVAR</button>
                <button class="btn btn-cancel">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL ALTERAR TURMA -->
    <div id="modalChangeTurma" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h3>Alterar Turma</h3></div>
            <input type="hidden" id="change-id">
            <div class="form-group">
                <label>Selecione a nova turma:</label>
                <select id="change-turma-select">
                    <option value="PRIMEIRA ETAPA">PRIMEIRA ETAPA</option>
                    <option value="SEGUNDA ETAPA">SEGUNDA ETAPA</option>
                    <option value="EUCARISTIA">EUCARISTIA</option>
                    <option value="PRÉ-CRISMA">PRÉ-CRISMA</option>
                    <option value="CRISMA">CRISMA</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn btn-save" onclick="updateTurma()">SALVAR ALTERAÇÃO</button>
                <button class="btn btn-cancel" onclick="closeModal('modalChangeTurma')">CANCELAR</button>
            </div>
        </div>
    </div>    

    <div id="toast-container"></div>

    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>

    <script type="module" src="scripts/controllers/turmas_and_catequistas/steps_and_catechists_controller.js"></script>
    <script type="module" src="scripts/utils/header.js"></script>
</body>
</html>
